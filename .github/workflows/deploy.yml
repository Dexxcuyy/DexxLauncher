name: Verify Contract

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Prepare forge-std
        run: |
          rm -rf lib/forge-std
          mkdir -p lib
          git clone https://github.com/foundry-rs/forge-std.git lib/forge-std

      - name: Build
        run: forge build

      - name: Verify on BaseScan
        env:
          ETHERSCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}
        run: |
          forge verify-contract \
            --chain base \
            --watch \
            --constructor-args $(cast abi-encode "constructor(address)" 0xE85A59c628F7d27878ACeB4bf3b35733630083a9) \
            --etherscan-api-key "$ETHERSCAN_API_KEY" \
            0xC7f2Cf4845C6db0e1a1e91ED41Bcd0FcC1b0E141 \
            src/DexxLauncher.sol:DexxLauncher
